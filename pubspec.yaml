name: flutter_colorable
description: Annotation-based colorable property extraction for Flutter widgets. Enables AI-driven color theming by marking which widget properties accept colors.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.0.0

dependencies:
  # Annotations package (no Flutter dependency for pure Dart usage)
  meta: ^1.9.0

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
